# ---------------------------------
# YOLO 检测相关参数
# ---------------------------------
detection:
  model_path: 'weights/best_1210_2.pt'  # <--- 在这里填写您的YOLO权重文件路径
  confidence_threshold: 0.5                 # 检测置信度阈值，例如 0.5

# ---------------------------------
# 显示窗口参数
# ---------------------------------
display:
  window_name: "YOLO OBB Detection"

# ---------------------------------
# 相机外参 (手眼标定矩阵)
# ---------------------------------
camera_extrinsics:
  matrix:
    # 这里填写您通过手眼标定得到的 4x4 矩阵
    # 例如: [[r11, r12, r13, tx], [r21, r22, r23, ty], [r31, r32, r33, tz], [0, 0, 0, 1]]
    # - [0.52824999, -0.20257968, -0.82456863,  0.16239853]
    # - [0.49016340,  0.86572086,  0.10132735,  0.04565638]
    # - [0.69331940, -0.45769953,  0.55661418, -0.16251526]
    # - [0.        ,  0.        ,  0.        ,  1.        ]
    # - [ 0.01053721, -0.42699052,  0.90419470, -0.13760350]
    # - [-0.99881710,  0.03843213,  0.02978883,  0.03339664]
    # - [-0.04746968, -0.90343902, -0.42608047,  0.11797660]
    # - [ 0.        ,  0.        ,  0.        ,  1.        ]
    # - [ 0.01053721, -0.42699052,  0.90419470, -0.133]
    # - [-0.99881710,  0.03843213,  0.02978883,  0.03339664]
    # - [-0.04746968, -0.90343902, -0.42608047,  0.093]
    # - [ 0.        ,  0.        ,  0.        ,  1.        ]
    - [ 9.98312756e-01 , 5.35906216e-02 ,-2.23536524e-02 , 4.85322248e-03]
    - [-4.50777375e-02 , 9.57941852e-01 , 2.83399727e-01 ,-7.08128813e-02]
    - [ 3.66010667e-02 ,-2.81913911e-01 , 9.58741315e-01 , 4.37687644e-02]
    - [ 0.00000000e+00 , 0.00000000e+00 , 0.00000000e+00 , 1.00000000e+00]



# ---------------------------------
# RealSense 相机数据流配置
# ---------------------------------
camera_streams:
  color:
    width: 640
    height: 480
    format: 'bgr8'  # OpenCV 通常使用 BGR 格式
    fps: 30
  depth:
    width: 640
    height: 480
    format: 'z16'   # 16位深度格式
    fps: 30

# ---------------------------------
# 深度图处理参数
# ---------------------------------
depth_processing:
  kernel_size: 5  # 示例值
